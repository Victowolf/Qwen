apiVersion: batch/v1
kind: Job
metadata:
  name: qwen-lora-server
spec:
  backoffLimit: 0
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: qwen-lora-container
          image: nvcr.io/nvidia/pytorch:24.03-py3
          env:
            - name: HF_HOME
              value: /workspace/models
            - name: TRANSFORMERS_CACHE
              value: /workspace/models
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "=== Starting Qwen LoRA FastAPI Server ==="

              cd /workspace || mkdir -p /workspace && cd /workspace

              echo "[1] Cloning repo..."
              rm -rf project || true
              git clone https://github.com/Victowolf/Qwen project

              cd project || (echo "ERROR: repo folder not found"; exit 1)

              echo "[2] Setting up environment..."

              # Remove conflicting NVIDIA libs
              pip uninstall -y torch torchvision torchaudio transformers peft accelerate bitsandbytes transformer-engine transformer-engine-cu12 transformer_engine_extensions || true

              pip uninstall -y flash-attn flash_attn flash_attn_2_cuda || true

              pip install --upgrade pip

              pip uninstall -y torch torchvision torchaudio transformers peft accelerate bitsandbytes || true

              pip install torch==2.3.0 --index-url https://download.pytorch.org/whl/cu121

              pip install transformers==4.41.2 peft==0.11.1 accelerate==0.30.1 bitsandbytes==0.43.1 fastapi uvicorn

              echo "[3] Starting FastAPI server..."

              uvicorn app.main:app --host 0.0.0.0 --port 8000

              echo "=== Server Exited ==="

          ports:
            - containerPort: 8000

          resources:
            limits:
              nvidia.com/mig-2g.35gb: 1